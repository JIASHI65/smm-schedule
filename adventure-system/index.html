<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🧭 莎莎的冒险系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0d12;--surface:#12151c;--surface2:#1a1e28;--surface3:#242836;--border:#2e3345;--text:#e0e4f0;--text-dim:#8890aa;--text-muted:#556077;--green:#34d399;--red:#ef4444;--gold:#ffd700;--cyan:#22d3ee;--purple:#7b5cf6;--pink:#ff6b9d;--blue:#3b82f6;--orange:#f59e0b;--teal:#14b8a6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0b0d12,#12151c);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.header h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.header .meta{font-size:11px;color:var(--text-dim)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.content{display:none;padding:10px 12px;max-width:700px;margin:0 auto}
.content.active{display:block}
.section-title{font-size:12px;font-weight:700;margin:10px 0 5px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.btn{background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.btn:hover{background:var(--border)}
.btn-green{background:rgba(52,211,153,0.15);border:1px solid var(--green);color:var(--green);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.btn-green:hover{background:rgba(52,211,153,0.25)}
.btn-cyan{background:rgba(34,211,238,0.15);border:1px solid var(--cyan);color:var(--cyan);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.btn-cyan:hover{background:rgba(34,211,238,0.25)}
.btn-gold{background:rgba(255,215,0,0.15);border:1px solid var(--gold);color:var(--gold);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.btn-gold:hover{background:rgba(255,215,0,0.25)}
.btn-red{background:rgba(239,68,68,0.15);border:1px solid var(--red);color:var(--red);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;position:relative}
.modal-box h2{font-size:14px;font-weight:700;margin-bottom:10px}
.modal-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:7px 9px;color:var(--text);font-size:12px;margin-bottom:6px}
.modal-box textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.empty-state{padding:30px 20px;text-align:center;color:var(--text-muted)}
.empty-state .empty-icon{font-size:36px;margin-bottom:8px}
.empty-state .empty-text{font-size:13px;font-weight:600;margin-bottom:4px}
.empty-state .empty-hint{font-size:11px;color:var(--text-dim);line-height:1.6}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:10px}
.stat-card{background:var(--surface2);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.stat-card .sn{font-size:18px;font-weight:800}
.stat-card .sl{font-size:10px;color:var(--text-dim);margin-top:2px}
.stat-card .sn.gold{color:var(--gold)}.stat-card .sn.cyan{color:var(--cyan)}.stat-card .sn.green{color:var(--green)}.stat-card .sn.pink{color:var(--pink)}.stat-card .sn.purple{color:var(--purple)}
.card{background:var(--surface);border-radius:8px;padding:10px 12px;margin-bottom:4px;border:1px solid var(--border);border-left:3px solid var(--text-dim)}
.card.goal{border-left-color:var(--gold)}.card.flight{border-left-color:var(--cyan)}.card.activity{border-left-color:var(--green)}.card.mission{border-left-color:var(--orange)}.card.memoir{border-left-color:var(--purple)}
.card .c-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.card .c-name{font-size:13px;font-weight:700}
.card .c-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface3)}
.card .c-tag.active{color:var(--red)}.card .c-tag.done{color:var(--green)}.card .c-tag.pending{color:var(--orange)}
.card .c-date{font-size:10px;color:var(--text-muted);margin-top:2px}
.card .c-note{font-size:11px;color:var(--text-dim);line-height:1.4;margin-top:2px}
.card .c-detail{font-size:11px;color:var(--cyan);margin-top:2px}
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;margin:4px 0;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:2px;transition:width .3s}
.progress-bar .fill.gold{background:var(--gold)}.progress-bar .fill.green{background:var(--green)}.progress-bar .fill.cyan{background:var(--cyan)}
.countdown{font-size:24px;font-weight:800;text-align:center;padding:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:8px}
.countdown .cd-label{font-size:11px;color:var(--text-dim);font-weight:400}
.countdown .cd-num{color:var(--gold)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:8px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.timeline-item{display:flex;gap:8px;margin-bottom:6px}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--border)}
.timeline-dot.gold{background:var(--gold)}.timeline-dot.cyan{background:var(--cyan)}.timeline-dot.green{background:var(--green)}.timeline-dot.purple{background:var(--purple)}.timeline-dot.pink{background:var(--pink)}
.timeline-content{flex:1;background:var(--surface2);border-radius:6px;padding:6px 10px;font-size:12px}
.timeline-content .tl-date{color:var(--text-muted);font-size:10px}
.timeline-content .tl-title{font-weight:600}
.timeline-content .tl-note{color:var(--text-dim);font-size:11px}
.import-area{background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.import-area textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:8px;color:var(--text);font-size:11px;min-height:80px;font-family:monospace;resize:vertical;margin-bottom:6px}
.city-wall{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.city-tag{background:var(--surface3);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--text-dim)}
.city-tag.visited{color:var(--cyan);border-color:var(--cyan);background:rgba(34,211,238,0.08)}
.daily-item{background:var(--surface2);border-radius:6px;padding:6px 10px;margin-bottom:3px;font-size:12px;display:flex;justify-content:space-between}
</style></head>
<body>
<div class="header">
  <h1>🧭 莎莎的冒险系统</h1>
  <div class="meta" id="headerMeta">loading...</div>
</div>
<div class="tabs" id="tabs">
  <div class="tab active" data-tab="dashboard">🗺️ 总览</div>
  <div class="tab" data-tab="footprints">✈️ 足迹</div>
  <div class="tab" data-tab="goals">🎯 目标</div>
  <div class="tab" data-tab="missions">💪 执行</div>
  <div class="tab" data-tab="memoir">🏅 回忆录</div>
  <div class="tab" data-tab="timeline">📅 时间轴</div>
  <div class="tab" data-tab="import">📥 导入</div>
</div>
<div id="tab-dashboard" class="content active"></div>
<div id="tab-footprints" class="content"></div>
<div id="tab-goals" class="content"></div>
<div id="tab-missions" class="content"></div>
<div id="tab-memoir" class="content"></div>
<div id="tab-timeline" class="content"></div>
<div id="tab-import" class="content"></div>
<div class="modal" id="modal"><div class="modal-box" id="modalBox"></div></div>
<div class="toast" id="toast"></div>
<script>
var DATA = null, ACTIVE_TAB = 'dashboard';

async function loadData(){
  var r = await fetch('/api/data'); DATA = await r.json();
}
async function saveData(){
  await fetch('/api/data', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(DATA)});
  renderAll();
}

document.getElementById('tabs').addEventListener('click', function(e){
  var tab = e.target.closest('.tab'); if(!tab) return;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  tab.classList.add('active');
  document.querySelectorAll('.content').forEach(function(c){c.classList.remove('active')});
  document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  ACTIVE_TAB = tab.dataset.tab;
  renderAll();
});

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function dateStr(d){if(!d)return'';return d.slice(0,10)}
function daysDiff(a,b){return Math.floor((new Date(b)-new Date(a))/86400000)}

var _formFields=null, _formOnSave=null;
function showForm(title, fields, onSave){
  var box=document.getElementById('modalBox');
  var html='<button class="modal-close" onclick="closeModal()">✕</button><h2>'+esc(title)+'</h2><div id="formFields">';
  for(var f of fields){
    html+='<div style="margin-bottom:4px"><label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:2px">'+esc(f.label)+'</label>';
    if(f.type==='select'){
      html+='<select id="f_'+f.key+'">';
      for(var o of f.options) html+='<option value="'+esc(o.v)+'" '+(f.value===o.v?'selected':'')+'>'+esc(o.l)+'</option>';
      html+='</select>';
    } else if(f.type==='textarea'){
      html+='<textarea id="f_'+f.key+'" placeholder="'+(f.placeholder||'')+'">'+(f.value||'')+'</textarea>';
    } else {
      html+='<input id="f_'+f.key+'" type="text" placeholder="'+(f.placeholder||'')+'" value="'+(f.value||'')+'">';
    }
    html+='</div>';
  }
  html+='</div><div class="modal-btns"><button class="btn-green" onclick="saveModal()">💾 保存</button><button class="btn" onclick="closeModal()">取消</button></div>';
  box.innerHTML=html;
  document.getElementById('modal').classList.add('active');
  _formFields=fields; _formOnSave=onSave;
}
function saveModal(){
  var data={};
  for(var f of _formFields){var el=document.getElementById('f_'+f.key);if(el) data[f.key]=el.value;}
  if(_formOnSave) _formOnSave(data);
}
function closeModal(){document.getElementById('modal').classList.remove('active')}

// ── Helpers ──
function totalFlights(){return (DATA.footprints.flights||[]).length}
function totalCities(){return (DATA.footprints.cities||[]).length}
function totalActivities(){return (DATA.memoir.activities||[]).length}
function activeGoals(){return (DATA.goals.lifetime||[]).filter(function(g){return g.status!=='done'}).length}

// ── Dashboard ──
function renderDashboard(){
  var el=document.getElementById('tab-dashboard');
  var flights=DATA.footprints.flights||[], cities=DATA.footprints.cities||[];
  var activities=DATA.memoir.activities||[], goals=DATA.goals.lifetime||[];
  var html='<div class="section-title">🗺️ 冒险概览</div>';
  html+='<div class="stats-grid">';
  html+='<div class="stat-card"><div class="sn cyan">'+flights.length+'</div><div class="sl">飞行次数</div></div>';
  html+='<div class="stat-card"><div class="sn green">'+cities.length+'</div><div class="sl">去过城市</div></div>';
  html+='<div class="stat-card"><div class="sn gold">'+activeGoals()+'</div><div class="sl">进行中目标</div></div>';
  html+='<div class="stat-card"><div class="sn pink">'+activities.length+'</div><div class="sl">冒险记录</div></div>';
  html+='</div>';

  // lifetime goals countdown
  var everest = goals.find(function(g){return g.name&&g.name.includes('珠峰')});
  if(everest && everest.target_date){
    var days = daysDiff(new Date().toISOString().slice(0,10), everest.target_date);
    if(days > 0){
      html += '<div class="countdown"><div class="cd-num">'+days+'</div><div class="cd-label">天 直到珠峰计划</div>';
      html += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">'+esc(everest.name)+'</div></div>';
    }
  }

  // recent activity timeline
  if(activities.length){
    html+='<div class="section-title">🏅 最新冒险</div>';
    var sorted=[...activities].sort(function(a,b){return(b.date||b.created||'').localeCompare(a.date||a.created||'')});
    for(var a of sorted.slice(0,4)){
      html+='<div class="card activity"><div class="c-header"><span class="c-name">'+esc(a.type||a.name)+'</span><span class="c-date">'+dateStr(a.date||a.created)+'</span></div>';
      if(a.location) html+='<div class="c-note">📍 '+esc(a.location)+'</div>';
      if(a.note) html+='<div class="c-note">'+esc(a.note)+'</div></div>';
    }
  }

  // visited cities wall
  if(cities.length){
    html+='<div class="section-title">🌏 足迹城市</div><div class="city-wall">';
    for(var c of cities) html+='<span class="city-tag visited">'+esc(c)+'</span>';
    html+='</div>';
  } else {
    html+='<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">还没有足迹数据</div><div class="empty-hint">去「导入」Tab添加航旅纵横或手动记录</div></div>';
  }
  el.innerHTML=html;
}
// ── Footprints ──
function renderFootprints(){
  var el=document.getElementById('tab-footprints');
  var fp=DATA.footprints;
  var flights=fp.flights||[], cities=fp.cities||[], trips=fp.trips||[];
  var html='<div class="section-title">✈️ 飞行足迹</div>';
  html+='<div class="btn-row"><button class="btn-cyan" onclick="addFlight()">+ 添加航班</button></div>';
  if(!flights.length){
    html+='<div class="empty-state"><div class="empty-icon">✈️</div><div class="empty-text">还没有飞行记录</div><div class="empty-hint">从航旅纵横导出数据或手动添加</div></div>';
  } else {
    var totalMiles=0;
    for(var f of flights){
      totalMiles += parseInt(f.miles)||0;
      html+='<div class="card flight"><div class="c-header"><span class="c-name">✈️ '+esc(f.from||'')+' → '+esc(f.to||'')+'</span><span class="c-date">'+dateStr(f.date)+'</span></div>';
      if(f.flight_no) html+='<div class="c-detail">'+esc(f.flight_no)+'</div>';
      if(f.airline) html+='<div class="c-note">'+esc(f.airline)+'</div>';
      if(f.miles) html+='<div class="c-note">📏 '+f.miles+'km</div>';
      html+='<div style="margin-top:2px"><button class="btn" style="padding:1px 6px;font-size:10px" onclick="editFlight(\''+esc(f.id)+'\')">✏️</button> <button class="btn-red" style="padding:1px 6px;font-size:10px" onclick="deleteFlight(\''+esc(f.id)+'\')">✕</button></div></div>';
    }
    html='<div class="stats-grid"><div class="stat-card"><div class="sn cyan">'+flights.length+'</div><div class="sl">总飞行</div></div><div class="stat-card"><div class="sn cyan">'+totalMiles+'</div><div class="sl">累计公里</div></div></div>'+html;
  }

  html+='<div class="section-title" style="margin-top:10px">🌏 足迹城市</div>';
  html+='<div class="btn-row"><button class="btn-green" onclick="addCity()">+ 添加城市</button></div>';
  if(cities.length){
    html+='<div class="city-wall">';
    for(var c of cities) html+='<span class="city-tag visited">'+esc(c)+'</span>';
    html+='</div>';
  } else {
    html+='<div class="empty-state" style="padding:15px"><div class="empty-icon" style="font-size:24px">🌍</div><div class="empty-text">还没有城市记录</div></div>';
  }
  el.innerHTML=html;
}

function addFlight(){
  showForm('添加航班', [
    {key:'date',label:'日期',type:'text',placeholder:'YYYY-MM-DD'},
    {key:'from',label:'出发地',type:'text',placeholder:'如：北京'},
    {key:'to',label:'目的地',type:'text',placeholder:'如：上海'},
    {key:'flight_no',label:'航班号',type:'text',placeholder:'如：CA1234'},
    {key:'airline',label:'航空公司',type:'text',placeholder:'如：国航'},
    {key:'miles',label:'里程(km)',type:'text',placeholder:'如：1200'}
  ], function(d){
    if(!DATA.footprints.flights) DATA.footprints.flights=[];
    DATA.footprints.flights.push({id:Date.now().toString(36),date:d.date,from:d.from,to:d.to,flight_no:d.flight_no,airline:d.airline,miles:d.miles});
    saveData();closeModal();showToast('已添加航班');
  });
}

function editFlight(id){
  var f=(DATA.footprints.flights||[]).find(function(x){return x.id===id}); if(!f)return;
  showForm('编辑航班',[
    {key:'date',label:'日期',type:'text',value:f.date},
    {key:'from',label:'出发地',type:'text',value:f.from||''},
    {key:'to',label:'目的地',type:'text',value:f.to||''},
    {key:'flight_no',label:'航班号',type:'text',value:f.flight_no||''},
    {key:'airline',label:'航空公司',type:'text',value:f.airline||''},
    {key:'miles',label:'里程',type:'text',value:f.miles||''}
  ],function(d){Object.assign(f,d);saveData();closeModal();showToast('已更新');});
}

function deleteFlight(id){
  if(!confirm('删除此航班？')) return;
  DATA.footprints.flights=(DATA.footprints.flights||[]).filter(function(x){return x.id!==id});
  saveData();showToast('已删除');
}

function addCity(){
  showForm('添加城市',[{key:'name',label:'城市名',type:'text',placeholder:'如：东京'}],function(d){
    if(!DATA.footprints.cities) DATA.footprints.cities=[];
    if(DATA.footprints.cities.includes(d.name)){showToast('城市已存在');closeModal();return;}
    DATA.footprints.cities.push(d.name);
    saveData();closeModal();showToast('已添加 '+d.name);
  });
}
// ── Goals ──
function renderGoals(){
  var el=document.getElementById('tab-goals');
  var goals=DATA.goals;
  var html='<div class="section-title">🎯 人生目标</div>';
  html+='<div class="btn-row"><button class="btn-gold" onclick="addGoal(\'lifetime\')">+ 人生目标</button>';
  html+='<button class="btn-green" onclick="addGoal(\'yearly\')">+ 年度目标</button>';
  html+='<button class="btn" onclick="addGoal(\'wishlist\')">+ 愿望清单</button></div>';

  // lifetime goals
  var lt=goals.lifetime||[];
  html+='<div class="section-title">🏔️ 人生大目标</div>';
  if(!lt.length) html+='<div class="empty-state" style="padding:15px"><div class="empty-text">还没有人生目标</div></div>';
  else {
    for(var g of lt){
      html+='<div class="card goal"><div class="c-header"><span class="c-name">🎯 '+esc(g.name)+'</span><span class="c-tag '+(g.status||'active')+'">'+(g.status==='done'?'已完成':g.status==='active'?'进行中':'搁置')+'</span></div>';
      if(g.target_date) html+='<div class="c-date">⏰ 目标日: '+dateStr(g.target_date)+' <span style="color:var(--gold)">(剩余 '+daysDiff(new Date().toISOString().slice(0,10),g.target_date)+' 天)</span></div>';
      if(g.note) html+='<div class="c-note">'+esc(g.note)+'</div>';
      if(g.milestones && g.milestones.length){
        html+='<div style="margin-top:3px">';
        for(var m of g.milestones){
          var mdone=m.done?'✅ ':'⬜ ';
          html+='<div style="font-size:10px;color:var(--text-dim)">'+mdone+esc(m.name)+(m.due?' <span style="color:var(--text-muted)">('+dateStr(m.due)+')</span>':'')+'</div>';
        }
        html+='</div>';
      }
      html+='<div style="margin-top:3px"><button class="btn" style="padding:1px 6px;font-size:10px" onclick="editGoal(\'lifetime\',\''+esc(g.id)+'\')">✏️</button> ';

function parseImport(){
  var text=document.getElementById('importText').value.trim();
  if(!text){showToast('请先粘贴数据');return;}
  var lines=text.split('\n').filter(Boolean);
  var imported={flights:[],activities:[],cities:[]};

  for(var line of lines){
    line=line.trim();
    var parts=line.split('|').map(function(s){return s.trim()});
    // flight: date | from | to | flight_no | airline | miles
    if(parts.length>=3 && /^\d{4}/.test(parts[0]) && parts[0].length<=12){
      imported.flights.push({date:parts[0],from:parts[1],to:parts[2],flight_no:parts[3]||'',airline:parts[4]||'',miles:parts[5]||''});
    }
    // comma-separated cities
    else if(line.includes(',')){
      var cities=line.split(/[,，]/).map(function(s){return s.trim()}).filter(Boolean);
      for(var c of cities) imported.cities.push(c);
    }
    // activity: date | type | location | note
    else if(/^\d{4}/.test(parts[0]) && parts.length>=2){
      imported.activities.push({date:parts[0],type:parts[1],location:parts[2]||'',note:parts.slice(3).join(', ')||''});
    }
  }

  var preview=document.getElementById('importPreview');
  var html='';
  var total=0;
  if(imported.flights.length){html+='<div style="font-size:11px;color:var(--cyan);margin:4px 0">✈️ '+imported.flights.length+' 条航班</div>';total+=imported.flights.length;}
  if(imported.activities.length){html+='<div style="font-size:11px;color:var(--green);margin:4px 0">🏅 '+imported.activities.length+' 条冒险</div>';total+=imported.activities.length;}
  if(imported.cities.length){html+='<div style="font-size:11px;color:var(--gold);margin:4px 0">🌏 '+imported.cities.length+' 个城市</div>';total+=imported.cities.length;}

  if(total===0){
    html+='<div style="font-size:11px;color:var(--red);margin:4px 0">⚠️ 未能识别有效数据</div>';
  } else {
    html+='<div class="btn-row"><button class="btn-cyan" onclick="confirmImport()">✅ 确认导入 '+total+' 条</button></div>';
  }
  preview.innerHTML=html;
  window._parsedImport=imported;
}

function confirmImport(){
  var p=window._parsedImport; if(!p)return;
  for(var f of(p.flights||[])){f.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);if(!DATA.footprints.flights)DATA.footprints.flights=[];DATA.footprints.flights.push(f);}
  for(var a of(p.activities||[])){a.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);a.created=new Date().toISOString();if(!DATA.memoir.activities)DATA.memoir.activities=[];DATA.memoir.activities.push(a);}
  for(var c of(p.cities||[])){if(!DATA.footprints.cities)DATA.footprints.cities=[];if(!DATA.footprints.cities.includes(c))DATA.footprints.cities.push(c);}
  saveData();
  document.getElementById('importText').value='';
  document.getElementById('importPreview').innerHTML='';
  showToast('✅ 导入成功！');
}

  var flights=DATA.footprints.flights||[];
  var cities=DATA.footprints.cities||[];
  document.getElementById('headerMeta').textContent='✈️ '+flights.length+' · 🌏 '+cities.length;
  switch(ACTIVE_TAB){
    case 'dashboard':renderDashboard();break;
    case 'footprints':renderFootprints();break;
    case 'goals':renderGoals();break;
    case 'missions':renderMissions();break;
    case 'memoir':renderMemoir();break;
    case 'timeline':renderTimeline();break;
    case 'import':renderImport();break;
  }
}

async function init(){
  await loadData();
  renderAll();
}
init();
</script>
</body>
</html>
