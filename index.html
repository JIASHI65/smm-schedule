<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 莎莎的主站</title>
<style>
:root{--bg:#0d0d0d;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--accent2:#0f3460;--text:#eaeaea;--text-dim:#8899aa;--border:#2a2a4a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0}
.logo{padding:12px 20px 20px;font-size:18px;font-weight:700;border-bottom:1px solid var(--border);margin-bottom:8px}
.logo span{color:var(--accent)}
.nav{flex:1;overflow-y:auto;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;color:var(--text-dim);font-size:14px;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent2);color:#fff;font-weight:600}
.nav-item .icon{font-size:18px;width:24px;text-align:center}
.nav-divider{height:1px;background:var(--border);margin:8px 14px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;min-height:48px;display:flex;align-items:center;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);font-size:14px;color:var(--text-dim)}
.topbar .title{color:var(--text);font-weight:600;margin-right:8px}
.topbar .status{margin-left:auto;font-size:12px}
.status.online{color:#4ade80}
.content{flex:1;overflow:hidden;position:relative;background:var(--bg)}
.content iframe{width:100%;height:100%;border:none;background:var(--bg)}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim);text-align:center;padding:40px}
.welcome h2{color:var(--text);font-size:24px}
.welcome p{font-size:14px;max-width:400px;line-height:1.6}
.welcome .grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.welcome .grid-item{padding:12px 20px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .15s}
.welcome .grid-item:hover{background:var(--surface2);border-color:var(--accent)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">👤 <span>莎莎</span>主站</div>
  <div class="nav">
    <div class="nav-item active" data-url="welcome" onclick="navigate(this)">
      <span class="icon">🏠</span> 首页
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item" data-url="/adventure-system/" onclick="navigate(this)">
      <span class="icon">🧭</span> 冒险系统
    </div>
    <div class="nav-item" data-url="/health-system/" onclick="navigate(this)">
      <span class="icon">🏥</span> 身体管理
    </div>
    <div class="nav-item" data-url="/task-system/" onclick="navigate(this)">
      <span class="icon">🌟</span> 星币任务
    </div>
    <div class="nav-item" data-url="/koc-exchange/" onclick="navigate(this)">
      <span class="icon">🎁</span> KOC 兑换
    </div>
    <div class="nav-item" data-url="/interview-armory/" onclick="navigate(this)">
      <span class="icon">⚔️</span> 面试军火库
    </div>
    <div class="nav-item" data-url="/bali-trip/" onclick="navigate(this)">
      <span class="icon">🌋</span> 巴厘岛计划
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item" data-url="/outputs/社媒排期_竖排时间线.html" onclick="navigate(this)">
      <span class="icon">📅</span> 社媒排期
    </div>
    <div class="nav-item" data-url="/outputs/社媒排期_平台分组.html" onclick="navigate(this)">
      <span class="icon">📱</span> 平台分组
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span class="title" id="pageTitle">🏠 首页</span>
    <span id="pageSubtitle" style="font-size:12px;color:var(--text-dim)"></span>
    <span class="status online" id="statusDot">● 本地运行</span>
  </div>
  <div class="content" id="contentArea">
    <div class="welcome">
      <h2>👤 欢迎回来，莎莎</h2>
      <p>点击左侧导航栏选择系统<br>所有数据本地存储，安全可控</p>
      <div class="grid">
        <div class="grid-item" onclick="navigateByUrl('/adventure-system/')">🧭 冒险系统</div>
        <div class="grid-item" onclick="navigateByUrl('/health-system/')">🏥 身体管理</div>
        <div class="grid-item" onclick="navigateByUrl('/task-system/')">🌟 星币任务</div>
        <div class="grid-item" onclick="navigateByUrl('/koc-exchange/')">🎁 KOC 兑换</div>
        <div class="grid-item" onclick="navigateByUrl('/interview-armory/')">⚔️ 面试</div>
        <div class="grid-item" onclick="navigateByUrl('/outputs/社媒排期_竖排时间线.html')">📅 排期</div>
      </div>
    </div>
  </div>
</div>

<script>
const titles = {
  'welcome': '🏠 首页',
  '/adventure-system/': '🧭 冒险系统',
  '/health-system/': '🏥 身体管理',
  '/task-system/': '🌟 星币任务',
  '/koc-exchange/': '🎁 KOC 兑换',
  '/interview-armory/': '⚔️ 面试军火库',
  '/bali-trip/': '🌋 巴厘岛计划',
  '/outputs/社媒排期_竖排时间线.html': '📅 社媒排期 · 时间线',
  '/outputs/社媒排期_平台分组.html': '📱 社媒排期 · 平台分组',
};
function navigate(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const url = el.dataset.url;
  if (url === 'welcome') return showWelcome();
  loadPage(url, titles[url] || '📄 页面');
}
function navigateByUrl(url) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.url === url));
  loadPage(url, titles[url] || '📄 页面');
}
function loadPage(url, title) {
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('contentArea').innerHTML = '<iframe src="'+url+'" loading="lazy"></iframe>';
}
function showWelcome() {
  document.getElementById('pageTitle').textContent = '🏠 首页';
  location.reload();
}
</script>
</body>
</html>
