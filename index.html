<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7月社媒排期 · 竖排时间线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--surface:#121821;--surface2:#1a2332;
  --border:#283040;--border-light:#354050;
  --text:#e4e8ef;--text-dim:#8895a8;--text-muted:#556070;
  --accent:#58a6ff;--green:#3fb950;--orange:#d29922;
  --pink:#f778ba;--red:#f85149;--purple:#bc8cff;--cyan:#39d2c0;
  --today:#162240;--glow:0 0 20px rgba(88,166,255,0.08)
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,var(--surface) 0%,rgba(18,24,33,0.95) 100%);
  border-bottom:1px solid var(--border);padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);gap:8px;flex-wrap:wrap;
}
.header h1{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-shrink:0}
.header h1 span{color:var(--text-dim);font-weight:400;font-size:11px}
.header .meta{font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.header .actions{display:flex;gap:4px}
.btn{
  padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface2);color:var(--text);font-size:10px;cursor:pointer;transition:all .1s;
}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,0.06)}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-sm{padding:2px 5px;font-size:9px}
.container{max-width:1280px;margin:0 auto;display:flex;flex-direction:column}
.day-row{display:grid;grid-template-columns:52px 1fr 240px;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.day-row:hover{background:rgba(88,166,255,0.015)}
.day-row.today{background:var(--today);border-left:3px solid var(--accent);box-shadow:var(--glow)}
.day-row.weekend{background:rgba(137,148,168,0.012)}

/* Date */
.day-date{padding:6px 2px;text-align:center;border-right:1px solid var(--border);padding-top:8px;position:relative}
.day-date .num{font-size:14px;font-weight:700;line-height:1}
.day-date .dow{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.3px}
.day-date .dow.we{color:var(--orange)}
.day-date .tag{font-size:7px;color:var(--text-muted);margin-top:2px}

/* ── Range bar connector ── */
.range-bar{position:absolute;left:-3px;top:0;width:3px;background:var(--accent);opacity:0.2;border-radius:0 0 2px 2px}
.range-bar.start{top:8px;opacity:0.35}
.range-bar.end{bottom:0;border-radius:2px 2px 0 0}
.range-bar.full{border-radius:2px;opacity:0.25}

/* Schedule */
.day-schedule{padding:4px 6px;display:flex;flex-direction:column;gap:3px;border-right:1px solid var(--border);min-height:32px}

.slot{
  border-radius:4px;cursor:pointer;transition:all .1s;
  background:transparent;border:1px solid transparent;
  display:flex;align-items:center;gap:4px;padding:3px 6px;
}
.slot:hover{background:var(--surface2);border-color:var(--border)}
.slot.collapsed{min-height:24px}
.slot .badge{
  font-size:8px;font-weight:600;padding:1px 4px;border-radius:2px;white-space:nowrap;flex-shrink:0;
}
.slot .badge.uw{background:rgba(188,140,255,0.15);color:var(--purple)}
.slot .badge.tt{background:rgba(63,185,80,0.12);color:var(--green)}
.slot .summary{
  flex:1;font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:flex;align-items:center;gap:4px;min-width:0;
}
.slot .summary .tp{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot .summary .sp{color:var(--text-muted);font-size:9px}
.slot .summary .pg{
  font-size:8px;padding:1px 4px;border-radius:2px;white-space:nowrap;flex-shrink:0;
}
.pg.p0{background:rgba(136,149,168,0.1);color:var(--text-dim)}
.pg.p1{background:rgba(210,153,34,0.12);color:var(--orange)}
.pg.p2{background:rgba(57,210,192,0.1);color:var(--cyan)}
.pg.p3{background:rgba(63,185,80,0.1);color:var(--green)}
.pg.p4{background:rgba(63,185,80,0.18);color:var(--green)}
.slot .cl{
  background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;
  padding:0 3px;border-radius:2px;opacity:0;transition:all .1s;flex-shrink:0;
}
.slot:hover .cl{opacity:0.5}
.cl:hover{opacity:1!important;color:var(--accent);background:rgba(88,166,255,0.1)}
.slot .del{
  background:none;border:none;color:var(--text-muted);font-size:10px;cursor:pointer;
  padding:0 3px;border-radius:2px;opacity:0;transition:all .1s;flex-shrink:0;margin-left:auto;
}
.slot:hover .del{opacity:0.3}
.del:hover{opacity:1!important;color:var(--red);background:rgba(248,81,73,0.1)}

/* Expanded */
.slot.expanded{
  background:var(--surface2);border:1px solid var(--border-light);
  cursor:default;flex-wrap:wrap;padding:6px 8px;gap:4px;
}
.slot.expanded .sg{display:grid;grid-template-columns:1fr 1fr;gap:3px 6px;width:100%}
.sg .fd{display:flex;flex-direction:column;gap:1px}
.sg .fd.fu{grid-column:1/-1}
.sg .fd label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.2px}
.sg .fd input,.sg .fd select,.sg .fd textarea{
  background:rgba(0,0,0,0.2);border:1px solid transparent;border-radius:3px;
  padding:2px 4px;color:var(--text);font-size:10px;font-family:inherit;width:100%;
}
.sg .fd input:focus,.sg .fd select:focus,.sg .fd textarea:focus{
  outline:none;border-color:var(--accent);background:rgba(88,166,255,0.04)
}
.sg .fd textarea{resize:vertical;min-height:16px}
.cb{background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:0 3px;border-radius:2px;flex-shrink:0}
.cb:hover{color:var(--accent);background:rgba(88,166,255,0.1)}

.add-bar{display:flex;gap:3px;padding:1px 6px}
.add-btn{
  background:none;border:1px dashed var(--border);border-radius:3px;
  color:var(--text-dim);font-size:9px;padding:1px 6px;cursor:pointer;opacity:0.25;transition:all .1s
}
.day-row:hover .add-btn{opacity:0.5}
.add-btn:hover{opacity:1!important;border-color:var(--accent);color:var(--accent)}

/* ── Reference ── */
.day-ref{padding:4px 6px;display:flex;flex-direction:column;gap:1px;position:relative}
.ref-item{display:flex;gap:2px;align-items:flex-start;padding:1px 0;border-left:2px solid transparent;padding-left:3px}
.ref-item.range-start{border-left-color:var(--accent)}
.ref-item.range-mid{border-left-color:var(--accent);opacity:0.6}
.ref-item.range-end{border-left-color:var(--accent)}
.ref-item .rt{
  font-size:7px;padding:0 3px;border-radius:2px;white-space:nowrap;flex-shrink:0;margin-top:1px;cursor:pointer;
}
.rt.h{background:rgba(210,153,34,0.1);color:var(--orange)}
.rt.v{background:rgba(88,166,255,0.08);color:var(--blue)}
.rt.i{background:rgba(247,120,186,0.08);color:var(--pink)}
.rt.e{background:rgba(57,210,192,0.08);color:var(--cyan)}
.ref-item .rtx{
  font-size:9px;color:var(--text-dim);line-height:1.4;cursor:pointer;flex:1;
  padding:0 2px;border-radius:2px;
}
.ref-item .rtx:hover{background:rgba(88,166,255,0.04)}
.ref-item .rd{
  background:none;border:none;color:var(--red);font-size:8px;cursor:pointer;
  opacity:0;padding:0 1px;margin-top:1px;
}
.ref-item:hover .rd{opacity:0.3}
.rd:hover{opacity:1!important}
.ref-empty{color:var(--text-dim);opacity:0.15;font-size:8px;font-style:italic}
.ref-add{
  background:none;border:1px dashed var(--border);border-radius:2px;
  color:var(--text-dim);font-size:8px;padding:0 4px;cursor:pointer;opacity:0;transition:all .1s;margin-top:0
}
.day-row:hover .ref-add{opacity:0.2}
.ref-add:hover{opacity:1!important;border-color:var(--accent);color:var(--accent)}

/* Modal */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px;max-width:500px;width:90%;max-height:70vh;overflow-y:auto
}
.modal h2{font-size:13px;margin-bottom:6px}
.modal textarea{
  width:100%;min-height:150px;background:var(--bg);
  border:1px solid var(--border);border-radius:4px;
  padding:6px;color:var(--text);font-size:10px;font-family:monospace;resize:vertical
}
.modal .br{display:flex;gap:5px;margin-top:6px;justify-content:flex-end}
.status-bar{display:flex;align-items:center;gap:4px;font-size:9px}
.sync-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sync-dot.on{background:var(--green);box-shadow:0 0 4px rgba(63,185,80,0.4)}
.sync-dot.off{background:var(--red);box-shadow:0 0 4px rgba(248,81,73,0.4)}
.sync-dot.saving{background:var(--orange);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

@media(max-width:900px){
  .day-row{grid-template-columns:42px 1fr}
  .day-ref{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:6px">
    <h1>📅 7月社媒排期 <span>| 竖排时间线</span></h1>
    <div class="status-bar" id="syncStatus">
      <span class="sync-dot on" id="syncDot"></span>
      <span id="syncText">已同步</span>
    </div>
  </div>
  <div class="meta">
    <span id="slotCount">0</span>
    <span>|</span>
    <span id="dataSource">云端</span>
  </div>
  <div class="actions">
    <button class="btn" onclick="exportData()">📤 导出</button>
    <button class="btn btn-sm" onclick="clearAll()">🗑️</button>
  </div>
</div>

<div class="container" id="timeline"></div>

<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>📤 导出排期</h2>
    <textarea id="exportText" readonly></textarea>
    <div class="br">
      <button class="btn" onclick="copyExport()">📋 复制</button>
      <button class="btn btn-primary" onclick="closeExport()">关闭</button>
    </div>
  </div>
</div>

<script>
// ── Data ──
const API = '/api/data';
const REF_API = '/api/refs';
const LS_KEY = 'smm_v3_fallback';

const REF_DEFAULTS = {"1": [{"type": "版本", "text": "沁夏臻境套间"}, {"type": "IP", "text": "联动签到 12天 持续一个月"}, {"type": "IP", "text": "kitty拼图"}, {"type": "IP", "text": "kitty委托 7/1-7/30"}, {"type": "版本", "text": "沁夏插画动态视频"}, {"type": "IP", "text": "KT上线PV"}, {"type": "IP", "text": "更换kitty联动头像&Banner"}], "2": [{"type": "版本", "text": "滑雪礼包 7/2-7/27"}, {"type": "版本", "text": "滑雪服装礼包宣发"}], "3": [], "4": [{"type": "节日", "text": "🎆 美国独立日"}], "5": [{"type": "IP", "text": "kitty小镇打卡二创活动"}], "6": [], "7": [{"type": "版本", "text": "儿童节家具礼包"}, {"type": "IP", "text": "KT联动预告三（转盘+寻物）"}, {"type": "IP", "text": "KT创作大赛 投稿：7/7-7/22"}], "8": [], "9": [{"type": "版本", "text": "绒雪套间展示（转盘预告）国服复用"}], "10": [{"type": "版本", "text": "往日预购"}, {"type": "版本", "text": "限时转盘"}, {"type": "IP", "text": "kitty转盘开启（融雪动态KV）"}], "11": [{"type": "版本", "text": "庙会服装礼包"}], "12": [], "13": [{"type": "版本", "text": "往日回响套间"}, {"type": "活动", "text": "玫瑰卡牌 7/13-7/22"}], "14": [], "15": [], "16": [], "17": [{"type": "节日", "text": "世界emoji日"}, {"type": "版本", "text": "烘焙套间展示（寻物预告）国服复用"}], "18": [{"type": "IP", "text": "kitty寻物"}, {"type": "IP", "text": "kitty寻物开启（烘焙动态KV）"}, {"type": "IP", "text": "kitty端内寻物社区配套活动"}], "19": [{"type": "版本", "text": "劳动节签到礼包"}], "20": [{"type": "版本", "text": "花影预购"}], "21": [], "22": [], "23": [{"type": "版本", "text": "花影乞巧套间"}, {"type": "活动", "text": "乞巧敲敲寻宝 7/23-8/1"}], "24": [], "25": [{"type": "版本", "text": "服装（男）礼包"}], "26": [], "27": [{"type": "版本", "text": "鹊桥星轨进阶礼包（主界面）"}], "28": [], "29": [], "30": [{"type": "版本", "text": "齿轮预购"}], "31": []};

const DOW=['日','一','二','三','四','五','六'];
const DOW_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const PROGRESS=['素材未到位','制作中','已完成','待发布','已发布'];
const SOURCES=['投放视频','自制视频','脚本输出','外部KOC','官方素材','其他'];

let S={}, R={}; // slots, refs
let editingSlot = null;
let dirty = false;

// ── API ──
async function loadFromServer(){
  try{
    const r=await fetch(API, {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    S=d.slots||{};
    R=d.refs||{};
    setSync(true);
    document.getElementById('dataSource').textContent='云端';
    return true;
  }catch(e){
    console.warn('Server load failed:', e);
    // Fallback: localStorage
    try{
      const ls=localStorage.getItem(LS_KEY);
      if(ls){const p=JSON.parse(ls);S=p.slots||{};R=p.refs||{}}
    }catch(e2){}
    setSync(false);
    document.getElementById('dataSource').textContent='本地';
    return false;
  }
}

let saveTimer = null;
function scheduleSave(){
  dirty = true;
  document.getElementById('syncText').textContent='待保存...';
  document.getElementById('syncDot').className='sync-dot saving';
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToServer, 800);
}

async function saveToServer(){
  const payload = JSON.stringify({slots:S, refs:R});
  try{
    const r=await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:payload});
    if(!r.ok) throw new Error('HTTP '+r.status);
    setSync(true);
    document.getElementById('syncText').textContent='已同步';
    dirty=false;
  }catch(e){
    console.warn('Server save failed:', e);
    // Fallback: localStorage
    try{localStorage.setItem(LS_KEY, payload)}catch(e2){}
    setSync(false);
    document.getElementById('syncText').textContent='本地保存';
  }
  updateCount();
}

function setSync(on){
  const dot=document.getElementById('syncDot');
  dot.className='sync-dot '+(on?'on':'off');
}

// ── Init ──
async function init(){
  const ok = await loadFromServer();
  // Merge defaults for missing refs
  for(let d=1;d<=31;d++){
    if(!R[d]) R[d]=JSON.parse(JSON.stringify(REF_DEFAULTS[d]||[]));
  }
  if(!ok) render(); else render();
  
  // Periodic sync check (every 30s)
  setInterval(async ()=>{
    if(!dirty){
      const fresh = await loadFromServer();
      if(fresh) render();
    }
  }, 30000);
}

function updateCount(){
  let c=0;
  for(const k in S){if(S[k]&&S[k].t&&S[k].t.trim())c++}
  document.getElementById('slotCount').textContent=c+' 条';
}

// ── Slot CRUD ──
function sk(d,t,i){return d+'_'+t+'_'+i}
function gs(d,t,i){
  const k=sk(d,t,i);
  if(!S[k]) S[k]={t:'',l:'',pd:'',p:'素材未到位',s:'投放视频',n:''};
  return S[k];
}
function us(d,t,i,f,v){
  const k=sk(d,t,i);
  if(!S[k]) S[k]={t:'',l:'',pd:'',p:'素材未到位',s:'投放视频',n:''};
  S[k][f]=v;
  scheduleSave();
}
function as(d,t){
  let i=0;while(S[sk(d,t,i)])i++;
  S[sk(d,t,i)]={t:'',l:'',pd:'',p:'素材未到位',s:'投放视频',n:''};
  scheduleSave();render();expandSlot(d,t,i);
}
function rs(d,t,i){delete S[sk(d,t,i)];scheduleSave();render()}
function expandSlot(d,t,i){
  editingSlot=sk(d,t,i);
  render();
  setTimeout(()=>{
    const inp=document.querySelector(`[data-sk="${sk(d,t,i)}"] .ef-t`);
    if(inp) inp.focus();
  },50);
}
function collapseSlot(){editingSlot=null;render()}

// ── Ref CRUD ──
function ur(d,i,v){if(R[d]&&R[d][i])R[d][i].text=v;scheduleSave();render()}
function ar(d){if(!R[d])R[d]=[];R[d].push({type:'活动',text:'新活动...'});scheduleSave();render()}
function rr(d,i){if(R[d])R[d].splice(i,1);scheduleSave();render()}
function crt(d,i){const C=['版本','节日','IP','活动'];const r=R[d]&&R[d][i];if(!r)return;const ci=C.indexOf(r.type);r.type=C[(ci+1)%C.length];scheduleSave();render()}

// ── Parse date ranges ──
function parseRange(text){
  // Match patterns like "7/1-7/30", "7/13-7/22"
  const m=text.match(/(\d+)\/(\d+)\s*[-–]\s*(\d+)\/(\d+)/);
  if(m){
    const sm=parseInt(m[1]),sd=parseInt(m[2]),em=parseInt(m[3]),ed=parseInt(m[4]);
    if(sm===7) return {start:sd, end:ed};
  }
  // Single date like "7/2-7/27"
  const m2=text.match(/(\d+)\/(\d+)\s*[-–]\s*(\d+)/);
  if(m2){
    const sm=parseInt(m2[1]),sd=parseInt(m2[2]),ed=parseInt(m2[3]);
    if(sm===7) return {start:sd, end:ed};
  }
  return null;
}

// ── Parse refs with ranges ──
function getRefsWithRanges(){
  const result = {};
  const ranges = []; // {start, end, type, text, originalDay}
  
  for(let d=1;d<=31;d++){
    const refs = R[d]||[];
    result[d] = [];
    refs.forEach((r,idx)=>{
      const range = parseRange(r.text);
      if(range && range.end > d){
        // This is a range starter - track it
        ranges.push({start:d, end:range.end, type:r.type, text:r.text, key:d+'_'+idx});
        result[d].push({...r, rangeStart:true, rangeEnd:false});
      } else if(range && range.end === d){
        result[d].push({...r, rangeStart:true, rangeEnd:true});
      } else {
        result[d].push({...r});
      }
    });
  }
  
  // Add range continuations
  ranges.forEach(rg=>{
    for(let d=rg.start+1; d<=rg.end; d++){
      if(!result[d]) result[d]=[];
      // Check if this continuation already exists
      const exists = result[d].some(r => r.text === rg.text);
      if(!exists){
        result[d].push({
          type: rg.type,
          text: rg.text,
          rangeMid: (d < rg.end),
          rangeEnd: (d === rg.end),
          rangeContinued: true
        });
      }
    }
  });
  
  return result;
}

// ── Render ──
function render(){
  const today=(()=>{const n=new Date();const u=n.getTime()+n.getTimezoneOffset()*60000;const s=new Date(u+8*3600000);return{m:s.getMonth()+1,d:s.getDate()}})();
  const el=document.getElementById('timeline');el.innerHTML='';
  const W=['W1','W2','W3','W4','W5'];
  
  const refsWithRanges = getRefsWithRanges();

  for(let d=1;d<=31;d++){
    const dt=new Date(2026,6,d);
    const dw=dt.getDay();
    const iT=today.m===7&&today.d===d;
    const iW=dw===0||dw===6;
    const wk=W[Math.min(Math.floor((d-1)/7),4)];

    const row=document.createElement('div');
    row.className='day-row'+(iT?' today':'')+(iW?' weekend':'');

    // Date
    const dc=document.createElement('div');dc.className='day-date';
    dc.innerHTML=`<div class="num">${d}</div><div class="dow${iW?' we':''}">${DOW_EN[dw]}</div><div class="tag">${wk}</div>`;
    row.appendChild(dc);

    // Schedule
    const sc=document.createElement('div');sc.className='day-schedule';
    const slots=[];
    for(const k in S){
      const m=k.match(/^(\d+)_(uw|tt)_(\d+)$/);
      if(m&&parseInt(m[1])===d) slots.push({idx:parseInt(m[3]),type:m[2],key:k,data:S[k]});
    }
    slots.sort((a,b)=>a.type.localeCompare(b.type)||a.idx-b.idx);

    slots.forEach(s=>{sc.appendChild(makeSlot(d,s.type,s.idx,s.key,s.data))});

    const ab=document.createElement('div');ab.className='add-bar';
    ab.innerHTML=`<button class="add-btn" onclick="as(${d},'uw')">+ 水下号</button><button class="add-btn" onclick="as(${d},'tt')">+ TT官号</button>`;
    sc.appendChild(ab);
    row.appendChild(sc);

    // Reference with range visualization
    const rc=document.createElement('div');rc.className='day-ref';
    const dayRefs = refsWithRanges[d]||[];
    dayRefs.forEach((r,i)=>{
      const item=document.createElement('div');item.className='ref-item';
      let rangeCls = '';
      if(r.rangeStart) rangeCls=' range-start';
      else if(r.rangeMid) rangeCls=' range-mid';
      else if(r.rangeEnd) rangeCls=' range-end';
      if(rangeCls) item.className='ref-item'+rangeCls;
      
      const tc={'版本':'rt v','节日':'rt h','IP':'rt i','活动':'rt e'}[r.type]||'rt e';
      // For range continuations, add a prefix
      let displayText = r.text;
      if(r.rangeContinued && !r.rangeEnd && !r.rangeStart){
        displayText = '↳ ' + r.text.replace(/[\d]+\/[\d]+[-–][\d]+\/[\d]+/g,'').trim();
      }
      if(r.rangeEnd && r.rangeContinued){
        displayText = '↳ ' + r.text.replace(/[\d]+\/[\d]+[-–][\d]+\/[\d]+/g,'').trim() + ' (结束)';
      }
      
      item.innerHTML=`
        <span class="${tc}" onclick="crt(${d},${i})">${r.type}</span>
        <span class="rtx">${esc(displayText)}</span>
        <button class="rd" onclick="rr(${d},${i})">✕</button>
      `;
      rc.appendChild(item);
    });
    if(dayRefs.length===0) rc.innerHTML+=`<div class="ref-empty">—</div>`;
    const addB=document.createElement('button');addB.className='ref-add';addB.textContent='+';addB.onclick=()=>ar(d);
    rc.appendChild(addB);
    row.appendChild(rc);

    el.appendChild(row);
  }
  updateCount();
}

function makeSlot(d,t,i,k,data){
  const isExpanded = editingSlot===k;
  const label = t==='uw'?'水下号':'TT官号';
  const bc = t==='uw'?'uw':'tt';
  const pi = Math.max(0,PROGRESS.indexOf(data.p));
  const pc = 'p'+pi;
  const summary = data.t||'(未填写)';
  const hasLink = data.l&&data.l.trim();

  if(!isExpanded){
    const div=document.createElement('div');
    div.className='slot collapsed';div.setAttribute('data-sk',k);
    div.ondblclick=()=>expandSlot(d,t,i);
    div.innerHTML=`
      <span class="badge ${bc}">${label}</span>
      <div class="summary">
        <span class="tp">${esc(summary)}</span>
        ${hasLink?`<span class="sp">·</span><span style="color:var(--text-muted);font-size:9px">🔗</span>`:''}
        <span class="pg ${pc}">${data.p}</span>
      </div>
      ${hasLink?`<button class="cl" onclick="event.stopPropagation();copyText('${esc(data.l)}')" title="复制链接">📋</button>`:''}
      <button class="del" onclick="event.stopPropagation();rs(${d},'${t}',${i})">✕</button>
    `;
    return div;
  }else{
    const div=document.createElement('div');
    div.className='slot expanded';div.setAttribute('data-sk',k);
    const dv=data.pd||'';
    div.innerHTML=`
      <div style="display:flex;align-items:center;gap:4px;width:100%">
        <span class="badge ${bc}">${label}</span>
        <span style="flex:1;font-size:10px;color:var(--text-dim)">编辑中 · Enter 折叠</span>
        <button class="del" style="opacity:0.4" onclick="rs(${d},'${t}',${i})">✕</button>
      </div>
      <div class="sg">
        <div class="fd fu">
          <label>📝 标题/文案</label>
          <input class="ef-t" type="text" value="${esc(data.t||'')}" placeholder="输入标题或文案..."
            onchange="us(${d},'${t}',${i},'t',this.value)"
            onkeydown="if(event.key==='Enter'){this.blur();collapseSlot()}">
        </div>
        <div class="fd">
          <label>🔗 素材公共盘</label>
          <div style="display:flex;gap:2px;align-items:center">
            <input type="text" value="${esc(data.l||'')}" placeholder="链接或路径..." onchange="us(${d},'${t}',${i},'l',this.value)" style="flex:1">
            ${data.l&&data.l.trim()?`<button class="cb" onclick="copyText('${esc(data.l)}')">📋</button>`:''}
          </div>
        </div>
        <div class="fd">
          <label>📅 发布日</label>
          <input type="date" value="${dv}" onchange="us(${d},'${t}',${i},'pd',this.value)">
        </div>
        <div class="fd">
          <label>📊 来源</label>
          <select onchange="us(${d},'${t}',${i},'s',this.value)">${SOURCES.map(o=>`<option value="${o}" ${data.s===o?'selected':''}>${o}</option>`).join('')}</select>
        </div>
        <div class="fd">
          <label>📈 进度</label>
          <select onchange="us(${d},'${t}',${i},'p',this.value)">${PROGRESS.map(o=>`<option value="${o}" ${data.p===o?'selected':''}>${o}</option>`).join('')}</select>
        </div>
        <div class="fd fu">
          <label>💬 备注</label>
          <textarea rows="1" placeholder="其他说明..." onchange="us(${d},'${t}',${i},'n',this.value)">${esc(data.n||'')}</textarea>
        </div>
      </div>
    `;
    return div;
  }
}

function copyText(t){
  if(!t)return;
  navigator.clipboard.writeText(t).then(()=>{
    const btn=event&&event.target;
    if(btn){const o=btn.textContent;btn.textContent='✅';setTimeout(()=>{btn.textContent=o},800)}
  }).catch(()=>{});
}

function exportData(){
  let txt='📅 7月社媒排期\n═══════════\n\n';
  for(let d=1;d<=31;d++){
    const items=[];
    for(const k in S){
      const m=k.match(/^(\d+)_(uw|tt)_(\d+)$/);
      if(m&&parseInt(m[1])===d){const s=S[k];if(s.t&&s.t.trim()) items.push({type:m[2]==='uw'?'水下号':'TT官号',data:s})}
    }
    if(items.length===0)continue;
    const dt=new Date(2026,6,d);
    txt+=`── 7月${d}日 周${DOW[dt.getDay()]} ──\n`;
    items.forEach(s=>{
      txt+=`【${s.type}】\n 标题：${s.data.t||'-'}\n`;
      if(s.data.l) txt+=` 素材：${s.data.l}\n`;
      if(s.data.pd) txt+=` 发布：${s.data.pd}\n`;
      txt+=` 来源：${s.data.s||'-'} | 进度：${s.data.p||'-'}\n`;
      if(s.data.n) txt+=` 备注：${s.data.n}\n\n`;
    });
  }
  document.getElementById('exportText').value=txt;
  document.getElementById('exportModal').classList.add('active');
}
function closeExport(){document.getElementById('exportModal').classList.remove('active')}
function copyExport(){
  const ta=document.getElementById('exportText');ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>alert('✅ 已复制')).catch(()=>{document.execCommand('copy');alert('✅ 已复制')});
}
function clearAll(){if(!confirm('确定清空所有？'))return;S={};scheduleSave();render()}
function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

init();
