<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌸 7月社媒排期 · 竖排时间线</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff6b9d;--primary-dark:#e55a8a;
  --accent:#c084fc;--accent-dark:#a855f7;
  --bg:#fff5f8;--surface:#ffffff;--surface2:#fff0f5;
  --border:#f0dce8;--border-light:#f5e6ee;
  --text:#2d1b3d;--text-dim:#8a7a9a;--text-muted:#b8a8b8;
  --green:#34d399;--orange:#fbbf24;--red:#f87171;--blue:#60a5fa;--pink:#f472b6;
  --pixel:'Press Start 2P',monospace;
  --font:'Quicksand',sans-serif;
  --shadow:0 2px 12px rgba(255,107,157,.08)
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--primary),var(--accent));color:white;
  padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.header h1{font-family:var(--pixel);font-size:11px;letter-spacing:1px}
.header h1 span{font-family:var(--font);font-weight:400;font-size:11px;opacity:.8}
.header .meta{font-size:11px;opacity:.8;display:flex;gap:8px;flex-wrap:wrap}
.header .sp{flex:1}
.btn{padding:5px 12px;border:2px solid rgba(255,255,255,.3);border-radius:10px;background:rgba(255,255,255,.15);color:white;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;font-family:var(--font);backdrop-filter:blur(4px)}
.btn:hover{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.5)}
.btn-pink{background:white;color:var(--primary);border-color:white}
.btn-pink:hover{background:rgba(255,255,255,.9)}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-danger{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.1)}
.btn-danger:hover{background:var(--red);color:white}

/* Timeline */
.tl{padding:12px 16px;max-width:800px;margin:0 auto}
.day{margin-bottom:12px}
.day-h{font-size:12px;font-weight:700;color:var(--text-dim);padding:6px 8px 4px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.day-h .dow{color:var(--primary);font-weight:600}
.day-h .cnt{font-weight:400;font-size:10px;color:var(--text-muted)}
.day-h .today-badge{background:var(--primary);color:white;font-size:8px;padding:1px 6px;border-radius:4px;font-family:var(--pixel)}

.slot{border:2px solid var(--border);border-radius:12px;background:var(--surface);margin-bottom:4px;overflow:hidden;box-shadow:var(--shadow)}
.slot-h{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:.15s}
.slot-h:hover{background:var(--surface2)}
.slot-h .acct-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;flex-shrink:0;font-family:var(--pixel)}
.slot-h .st{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-h .st.empty{color:var(--text-muted);font-weight:400}
.slot-h .badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;flex-shrink:0;white-space:nowrap}
.bg-pending{background:rgba(248,113,113,.12);color:var(--red)}
.bg-making{background:rgba(251,191,36,.12);color:#d97706}
.bg-done{background:rgba(52,211,153,.12);color:#059669}
.bg-draft{background:rgba(142,122,154,.12);color:var(--text-dim)}
.bg-ready{background:rgba(192,132,252,.12);color:var(--accent-dark)}

.slot-body{display:none;padding:8px 10px 10px;border-top:1px solid var(--border);background:var(--surface2)}
.slot-body.open{display:block}
.field{margin-bottom:8px}
.field label{font-size:9px;font-weight:700;color:var(--text-dim);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:6px 8px;border:2px solid var(--border);border-radius:8px;background:white;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.field .link-row{display:flex;gap:4px}
.field .link-row input{flex:1}
.field .cpy{padding:4px 8px;border:2px solid var(--border);border-radius:6px;background:white;cursor:pointer;font-size:10px;color:var(--primary);font-weight:600;transition:.15s}
.field .cpy:hover{background:var(--primary);color:white;border-color:var(--primary)}
.slot-actions{display:flex;gap:4px;margin-top:6px;justify-content:flex-end}
.slot-actions button{padding:3px 10px;border:2px solid var(--border);border-radius:6px;background:white;cursor:pointer;font-size:10px;font-weight:600;color:var(--text-dim);transition:.15s;font-family:var(--font)}
.slot-actions button:hover{border-color:var(--primary);color:var(--primary)}
.slot-actions .del:hover{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.06)}

/* References */
.refs{margin:16px auto;max-width:800px;padding:0 16px}
.refs-h{font-size:12px;font-weight:700;color:var(--text-dim);padding:6px 8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.ref-item{display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:12px}
.ref-item .rtag{font-size:8px;padding:1px 6px;border-radius:4px;font-weight:700;font-family:var(--pixel)}
.rtag-V{background:rgba(96,165,250,.12);color:var(--blue)}
.rtag-节日{background:rgba(251,191,36,.12);color:#d97706}
.rtag-IP{background:rgba(192,132,252,.12);color:var(--accent-dark)}
.rtag-活动{background:rgba(52,211,153,.12);color:#059669}

/* Add modal */
.modal{display:none;position:fixed;inset:0;background:rgba(45,27,61,.5);align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal.show{display:flex}
.modal-inner{background:white;border:3px solid var(--border);border-radius:16px;padding:24px;width:420px;box-shadow:0 8px 30px rgba(255,107,157,.15)}
.modal-inner h2{font-family:var(--pixel);font-size:11px;color:var(--primary);margin-bottom:12px}
.modal-inner .actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

.empty{padding:40px;text-align:center;color:var(--text-dim)}
.empty .big{font-size:28px;margin-bottom:6px}

@media(max-width:600px){.header h1{font-size:9px}.slot-h .st{font-size:12px}}
</style>
</head>
<body>

<div class="header">
  <h1>🌸 7月社媒排期</h1>
  <span class="meta">📱 官号 · 🕶️ 水下号</span>
  <span class="sp"></span>
  <button class="btn btn-pink btn-sm" onclick="showAddModal()">＋ 新增</button>
  <button class="btn btn-sm" onclick="exportData()">📥 导出</button>
  <button class="btn btn-sm" onclick="document.getElementById('importInp').click()">📤 导入</button>
  <input type="file" id="importInp" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="tl" id="timeline"></div>

<div class="refs" id="refsSection"></div>

<div class="modal" id="addModal">
  <div class="modal-inner">
    <h2>🌸 新增排期</h2>
    <div class="field"><label>日期</label><input type="date" id="af_date"></div>
    <div class="field"><label>账号</label>
      <select id="af_acct">
        <option value="tt">📱 官号 TikTok</option>
        <option value="uw">🕶️ 水下号</option>
      </select>
    </div>
    <div class="field"><label>来源</label>
      <select id="af_src">
        <option value="官号">官号</option>
        <option value="投放视频">投放视频</option>
        <option value="自己制作">自己制作</option>
        <option value="自己写脚本">自己写脚本</option>
      </select>
    </div>
    <div class="field"><label>标题 / 文案</label><input type="text" id="af_title"></div>
    <div class="field"><label>公共盘链接</label><input type="text" id="af_link"></div>
    <div class="field"><label>发布日期</label><input type="date" id="af_pd"></div>
    <div class="field"><label>进度</label>
      <select id="af_prog">
        <option value="已排期">已排期</option>
        <option value="素材未到位">素材未到位</option>
        <option value="制作中">制作中</option>
        <option value="已完成">已完成</option>
      </select>
    </div>
    <div class="field"><label>备注</label><input type="text" id="af_note"></div>
    <div class="actions">
      <button class="btn" onclick="closeAdd()" style="color:var(--text);border-color:var(--border)">取消</button>
      <button class="btn btn-pink" onclick="saveAdd()" style="color:white;background:var(--primary);border-color:var(--primary)">保存</button>
    </div>
  </div>
</div>

<script>
// === Recovered Data ===
const ACCOUNTS = {
  tt: { label: '📱 官号 TikTok', color: '#ff6b9d', cls: 'tt' },
  uw: { label: '🕶️ 水下号', color: '#c084fc', cls: 'uw' }
};

const PROGRESS_MAP = {
  '已排期': { cls: 'bg-ready', label: '已排期' },
  '素材未到位': { cls: 'bg-pending', label: '素材未到位' },
  '制作中': { cls: 'bg-making', label: '制作中' },
  '已完成': { cls: 'bg-done', label: '已完成' }
};

const REF_TYPES = { '版本':'V','节日':'节日','IP':'IP','活动':'活动' };

let S = {}; // slots: { 'day_acct_idx': {t,l,pd,p,s,n} }
let R = {}; // refs: { day: [{type, text}] }

// === Load ===
function load() {
  try {
    const raw = localStorage.getItem('sched_final');
    if (raw) { const d = JSON.parse(raw); S = d.slots || {}; R = d.refs || {}; return; }
  } catch(e) {}
  // Fallback: embedded data
  S = {
    "11_tt_0": {"t":"Wild thunderstorm outside, pure cozy peace inside. Rain ASMR for relaxation.","l":"","pd":"2026-07-11","p":"已排期","s":"官号","n":""},
    "13_tt_0": {"t":"Full outfit archive revealed! Which one is your favorite?","l":"","pd":"2026-07-13","p":"已排期","s":"官号","n":""},
    "14_tt_0": {"t":"Wanna drift in this dream world? ✨","l":"","pd":"2026-07-14","p":"已排期","s":"官号","n":""},
    "15_tt_0": {"t":"Just sit back, collect blooms and unlock pretty dresses 🌟🌟🌟","l":"","pd":"2026-07-15","p":"已排期","s":"官号","n":""},
    "18_tt_0": {"t":"Swing open my window to endless swirling starlight ✨","l":"","pd":"2026-07-18","p":"素材未到位","s":"官号","n":""},
    "1_tt_0": {"t":"幸存","l":"","pd":"","p":"素材未到位","s":"投放视频","n":""},
    "1_uw_0": {"t":"231323","l":"321321","pd":"2026-07-24","p":"制作中","s":"投放视频","n":"3213213"},
    "21_tt_0": {"t":"Start with an empty run-down house, build my dream cozy cottage","l":"","pd":"2026-07-21","p":"素材未到位","s":"官号","n":""},
    "24_tt_0": {"t":"Wait till you see My Leisure Time in third person—total vibe shift!☀️","l":"","pd":"2026-07-24","p":"素材未到位","s":"官号","n":""},
    "26_tt_0": {"t":"How long would you stay indoors if your house was filled with all kinds of food? ✨","l":"","pd":"2026-07-26","p":"素材未到位","s":"官号","n":""},
    "2_tt_0": {"t":"","l":"","pd":"","p":"素材未到位","s":"投放视频","n":""},
    "2_tt_1": {"t":"","l":"","pd":"","p":"素材未到位","s":"投放视频","n":""},
    "30_tt_0": {"t":"Just spending all my lazy days with this sweet pets！💗","l":"","pd":"2026-07-30","p":"素材未到位","s":"官号","n":""}
  };
  R = {
    "1": [{"type":"版本","text":"沁夏臻境套间"},{"type":"IP","text":"联动签到 12天 持续一个月"},{"type":"IP","text":"kitty拼图"},{"type":"IP","text":"kitty委托 7/1-7/30"},{"type":"版本","text":"沁夏插画动态视频"},{"type":"版本","text":"kitty联动"},{"type":"版本","text":"夏日活动"}]
  };
  save();
}

function save() {
  try { localStorage.setItem('sched_final', JSON.stringify({slots:S, refs:R})); } catch(e) {}
}

// === Render ===
function render() {
  const el = document.getElementById('timeline');
  const days = {};
  Object.keys(S).forEach(k => {
    const parts = k.split('_');
    const d = parseInt(parts[0]);
    if (!days[d]) days[d] = [];
    days[d].push({ key: k, data: S[k] });
  });

  const sorted = Object.keys(days).sort((a,b) => a-b);
  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty"><div class="big">🌸</div>还没有排期内容<br><span style="font-size:12px;color:var(--text-muted)">点「＋ 新增」添加</span></div>';
    renderRefs();
    return;
  }

  const today = new Date().getDate();
  const WEEKDAYS = ['日','一','二','三','四','五','六'];
  let html = '';

  sorted.forEach(d => {
    const dt = new Date(2026, 6, d);
    const wd = WEEKDAYS[dt.getDay()];
    const isToday = d === today ? '<span class="today-badge">TODAY</span>' : '';
    html += `<div class="day"><div class="day-h"><span class="dow">${d}日 周${wd}</span>${isToday}<span class="cnt">${days[d].length} 条</span></div>`;
    
    days[d].sort((a,b) => a.key.localeCompare(b.key));
    days[d].forEach(item => {
      const k = item.key;
      const v = item.data;
      const parts = k.split('_');
      const acctKey = parts[1];
      const acct = ACCOUNTS[acctKey] || { label: acctKey, color: '#888' };
      const prog = PROGRESS_MAP[v.p] || { cls: 'bg-draft', label: v.p || '待定' };
      const title = v.t || '无标题';
      const isOpen = window._openSlot === k;
      
      html += `<div class="slot">`;
      html += `<div class="slot-h" onclick="toggleSlot('${k}')">
        <span class="acct-tag" style="background:${acct.color}22;color:${acct.color}">${acct.label}</span>
        <span class="st ${!v.t ? 'empty' : ''}">${esc(title)}</span>
        <span class="badge ${prog.cls}">${prog.label}</span>
      </div>`;
      html += `<div class="slot-body ${isOpen ? 'open' : ''}" id="body_${k}">`;
      
      // Title
      html += `<div class="field"><label>🎬 标题/文案</label><input type="text" value="${esc(v.t||'')}" onchange="up('${k}','t',this.value)" onfocus="window._editSlot='${k}'"></div>`;
      // Link
      html += `<div class="field"><label>📎 公共盘链接</label><div class="link-row"><input type="text" value="${esc(v.l||'')}" onchange="up('${k}','l',this.value)"><button class="cpy" onclick="cp('${v.l||''}')">📋</button></div></div>`;
      // Publish date
      html += `<div class="field"><label>📅 发布日期</label><input type="date" value="${v.pd||''}" onchange="up('${k}','pd',this.value)"></div>`;
      // Progress
      html += `<div class="field"><label>📌 进度</label><select onchange="up('${k}','p',this.value)">
        ${Object.keys(PROGRESS_MAP).map(p => `<option ${v.p===p?'selected':''}>${p}</option>`).join('')}
      </select></div>`;
      // Source
      html += `<div class="field"><label>📦 素材来源</label><select onchange="up('${k}','s',this.value)">
        ${['官号','投放视频','自己制作','自己写脚本'].map(s => `<option ${v.s===s?'selected':''}>${s}</option>`).join('')}
      </select></div>`;
      // Notes
      html += `<div class="field"><label>📝 备注</label><input type="text" value="${esc(v.n||'')}" onchange="up('${k}','n',this.value)"></div>`;
      // Actions
      html += `<div class="slot-actions"><button class="del" onclick="delSlot('${k}')">🗑 删除</button></div>`;
      
      html += `</div></div>`;
    });
    html += '</div>';
  });

  el.innerHTML = html;
  renderRefs();
}

function renderRefs() {
  const el = document.getElementById('refsSection');
  const sorted = Object.keys(R).sort((a,b) => a-b);
  if (sorted.length === 0) { el.innerHTML = ''; return; }
  let html = '<div class="refs-h">📋 游戏节点 / 版本</div>';
  sorted.forEach(d => {
    html += `<div style="margin-bottom:6px"><div style="font-size:11px;font-weight:600;color:var(--text-dim);padding:2px 8px">${d}日</div>`;
    (R[d] || []).forEach((r, i) => {
      const t = REF_TYPES[r.type] || r.type;
      html += `<div class="ref-item"><span class="rtag rtag-${t}">${t}</span><span>${esc(r.text)}</span>`;
      html += `<button class="btn btn-sm" style="margin-left:auto;color:var(--red);border-color:var(--border);padding:1px 6px" onclick="delRef(${d},${i})">✕</button></div>`;
    });
    html += `<button class="btn btn-sm" style="margin:2px 8px;color:var(--primary);border-color:var(--border)" onclick="addRefPrompt(${d})">＋ 添加节点</button>`;
  });
  el.innerHTML = html;
}

function toggleSlot(k) {
  if (window._openSlot === k) window._openSlot = null;
  else window._openSlot = k;
  render();
}

function up(k, field, val) {
  if (!S[k]) S[k] = {};
  S[k][field] = val;
  save();
}

function delSlot(k) {
  if (!confirm('确定删除？')) return;
  delete S[k];
  if (window._openSlot === k) window._openSlot = null;
  save(); render();
}

function showAddModal() {
  document.getElementById('af_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('af_title').value = '';
  document.getElementById('af_link').value = '';
  document.getElementById('af_pd').value = '';
  document.getElementById('af_note').value = '';
  document.getElementById('af_prog').value = '已排期';
  document.getElementById('af_src').value = '官号';
  document.getElementById('addModal').classList.add('show');
}

function closeAdd() { document.getElementById('addModal').classList.remove('show'); }

function saveAdd() {
  const date = document.getElementById('af_date').value;
  const acct = document.getElementById('af_acct').value;
  const src = document.getElementById('af_src').value;
  const title = document.getElementById('af_title').value.trim();
  const link = document.getElementById('af_link').value.trim();
  const pd = document.getElementById('af_pd').value;
  const prog = document.getElementById('af_prog').value;
  const note = document.getElementById('af_note').value.trim();
  if (!date || !acct) { alert('请填写日期和账号'); return; }
  const day = parseInt(date.split('-')[2]);
  // Find next index for this day+acct
  let idx = 0;
  Object.keys(S).forEach(k => {
    const p = k.split('_');
    if (parseInt(p[0]) === day && p[1] === acct) idx = Math.max(idx, parseInt(p[2]) + 1);
  });
  const key = `${day}_${acct}_${idx}`;
  S[key] = { t: title, l: link, pd, p: prog, s: src, n: note };
  save(); render(); closeAdd();
}

function addRefPrompt(d) {
  const types = ['版本','节日','IP','活动'];
  const t = prompt('节点类型: ' + types.join('/') + ' (默认 版本)');
  if (t === null) return;
  const text = prompt('节点内容:');
  if (text === null || !text.trim()) return;
  const type = types.find(x => x === t) || '版本';
  if (!R[d]) R[d] = [];
  R[d].push({ type, text: text.trim() });
  save(); render();
}

function delRef(d, i) {
  if (!R[d]) return;
  R[d].splice(i, 1);
  if (R[d].length === 0) delete R[d];
  save(); render();
}

function cp(link) {
  if (!link) return;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.querySelector('.cpy');
    if (btn) { const o = btn.innerHTML; btn.innerHTML = '✅'; setTimeout(() => btn.innerHTML = o, 1200); }
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify({slots:S, refs:R}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `排期_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.slots) { S = d.slots; R = d.refs || {}; save(); render(); alert(`✅ 已导入 ${Object.keys(S).length} 条`); }
      else { alert('❌ 无效文件'); }
    } catch(e) { alert('❌ 解析失败'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
load();
render();

document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeAdd(); });
</script>
</body>
</html>
