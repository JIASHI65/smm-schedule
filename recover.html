<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🔍 全面扫描 (含 session)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff5f8;color:#2d1b3d;padding:30px;max-width:700px;margin:auto}
h1{font-size:20px;margin-bottom:4px;color:#ff6b9d}
.sub{color:#8a7a9a;font-size:13px;margin-bottom:20px}
.card{background:white;border:2px solid #f0dce8;border-radius:12px;padding:16px;margin:12px 0}
.key{font-size:13px;font-weight:600;margin-bottom:2px}
.val{font-size:11px;color:#64748b;background:#fdf2f7;padding:8px;border-radius:6px;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;margin-bottom:4px}
.empty{color:#8a7a9a;font-size:14px;padding:30px;text-align:center}
.green{color:#34d399}
</style></head>
<body>
<h1>🔍 完整扫描</h1>
<div class="sub" id="status">扫描 localStorage + sessionStorage...</div>
<div id="results"></div>

<script>
function scan() {
  let html = '';

  // localStorage
  const lsKeys = [];
  for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k) lsKeys.push(k); }

  // sessionStorage
  const ssKeys = [];
  try { for (let i = 0; i < sessionStorage.length; i++) { const k = sessionStorage.key(i); if (k) ssKeys.push(k); } } catch(e) {}

  const el = document.getElementById('results');
  const status = document.getElementById('status');

  if (lsKeys.length === 0 && ssKeys.length === 0) {
    status.textContent = '😢 localStorage 和 sessionStorage 都没有数据';
    el.innerHTML = '<div class="card"><div class="empty">当前域名下没有任何存储数据</div></div>';
    return;
  }

  let total = 0;

  if (lsKeys.length > 0) {
    html += '<div class="card"><div class="key green">📍 localStorage (' + lsKeys.length + ' 个键)</div>';
    lsKeys.forEach(k => {
      try {
        const v = localStorage.getItem(k);
        let extra = '';
        if (v && v.length > 0) {
          try { const p = JSON.parse(v); if (p.entries) extra = ' — 含 ' + p.entries.length + ' 条排期'; else if (p.items) extra = ' — 含 ' + p.items.length + ' 条排期'; } catch(e) {}
          total++;
        }
        html += '<div class="key">🔑 ' + k + extra + '</div>';
        html += '<div class="val">' + esc((v || '(空)').slice(0, 300)) + '</div>';
      } catch(e) {}
    });
    html += '</div>';
  }

  if (ssKeys.length > 0) {
    html += '<div class="card"><div class="key green">📍 sessionStorage (' + ssKeys.length + ' 个键)</div>';
    ssKeys.forEach(k => {
      try {
        const v = sessionStorage.getItem(k);
        html += '<div class="key">🔑 ' + k + '</div>';
        html += '<div class="val">' + esc((v || '(空)').slice(0, 300)) + '</div>';
      } catch(e) {}
    });
    html += '</div>';
  }

  status.textContent = '📊 共 ' + lsKeys.length + ' 个 localStorage 键 + ' + ssKeys.length + ' 个 sessionStorage 键';
  el.innerHTML = html;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
scan();
</script>
</body>
</html>
