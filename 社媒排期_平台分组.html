<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- v=1784093564 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📱 社媒排期 · 账号分组</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fef6f9;--surface:#ffffff;--surface2:#fff5f8;--surface3:#fff0f5;--border:#f0dce4;--text:#3d3036;--text-dim:#9a7a88;--text-muted:#c0a0b0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#fff0f5,#fff5f8);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.header h1{font-size:14px;font-weight:700;color:#d6336c}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:10px;text-decoration:none;transition:.15s}
.btn:hover{background:#ffe8ef;border-color:#ffb0c8}
.container{max-width:800px;margin:0 auto;padding:10px 12px}
.sec{margin-bottom:14px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;font-weight:700;border-bottom:1px solid rgba(0,0,0,.04)}
.sec-body{background:#ffffff;overflow:hidden}
.post{display:flex;padding:9px 14px;border-bottom:1px solid #f5eaef;align-items:flex-start;gap:10px;font-size:12px}
.post:last-child{border-bottom:none}
.post:hover{background:#fff5f8}
.pd{font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:44px;line-height:1.5}
.pt{font-size:10px;color:var(--text-muted)}
.pc{flex:1;min-width:0}
.pn{font-weight:600;font-size:12px;color:var(--text)}
.pdsc{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;background:#fff0f5;color:#d6336c;white-space:nowrap}
.tag.s{background:#e8f5e9;color:#2e7d32}
.tag.w{background:#fff3e0;color:#e65100}
.empty{text-align:center;padding:30px;color:var(--text-muted);font-size:12px}
.loading{text-align:center;padding:40px;color:var(--text-dim);font-size:12px}
.stats{display:flex;gap:10px;flex-wrap:wrap;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;color:var(--text-dim)}
.stats span{display:flex;align-items:center;gap:3px}
</style>
</head>
<body>

<div class="header">
  <h1>📱 社媒排期 · 账号分组</h1>
  <div style="display:flex;align-items:center;gap:6px">
    <button type="button" class="btn" onclick="goToMonth(-1)" title="上个月">◀</button>
    <span id="monthLabel" style="font-size:13px;font-weight:600;color:#d6336c;min-width:80px;text-align:center"></span>
    <button type="button" class="btn" onclick="goToMonth(1)" title="下个月">▶</button>
    <a href="%E7%A4%BE%E5%AA%92%E6%8E%92%E6%9C%9F_%E7%AB%96%E6%8E%92%E6%97%B6%E9%97%B4%E7%BA%BF.html" class="btn">⬅ 返回时间线</a>
  </div>
</div>
<div class="container" id="app">
  <div class="loading">⏳ 加载中...</div>
</div>

<script>
const GH_USER = 'jiashi65';
const GH_REPO = 'smm-schedule';
const GH_BRANCH = 'main';
const RAW_URL = 'https://cdn.jsdelivr.net/gh/'+GH_USER+'/'+GH_REPO+'@'+GH_BRANCH+'/smm_data.json';

const LABELS = {'uw':'欧美水下号','tt':'欧美TT官号','hkig':'港台条漫IG','usig':'欧美条漫IG','ustt':'欧美条漫TT','usfb':'欧美FB官号','usigoff':'欧美IG官号'};

// Account groups with emoji/colors
const GROUPS = [
  {key:'uw', label:'🌊 欧美水下号', color:'#8b5cf6', bg:'rgba(139,92,246,0.06)'},
  {key:'tt', label:'🎵 欧美TT官号', color:'#10b981', bg:'rgba(16,185,129,0.06)'},
  {key:'usigoff', label:'📸 欧美IG官号', color:'#e1306c', bg:'rgba(225,48,108,0.06)'},
  {key:'usfb', label:'👍 欧美FB官号', color:'#1877f2', bg:'rgba(24,119,242,0.06)'},
  {key:'usig', label:'🎨 欧美条漫IG', color:'#c13584', bg:'rgba(193,53,132,0.06)'},
  {key:'ustt', label:'🎵 欧美条漫TT', color:'#25f4ee', bg:'rgba(37,244,238,0.06)'},
  {key:'hkig', label:'🌏 港台条漫IG', color:'#4361ee', bg:'rgba(67,97,238,0.06)'},
];

const PROGRESS = ['待制作','制作中','已排期','已发布'];

const LS_KEY = 'smm_v3_fallback';

function loadLocal(){
  try{const ls=localStorage.getItem(LS_KEY);if(ls){const j=JSON.parse(ls);if(j&&j.slots) return j.slots;}}catch(e){}
  return null;
}

async function loadData(){
  // 1. Try localStorage first (same source as 竖排时间线)
  const local = loadLocal();
  if(local && Object.keys(local).length > 10) return local;

  // 2. Fallback: GitHub CDN
  try {
    const r=await fetch(RAW_URL, {cache:'no-store'});
    if(r.ok){const j=await r.json(); return j;}
  }catch(e){}
  return null;
}

function render(data){
  const app = document.getElementById('app');
  if(!data || Object.keys(data).length===0){
    app.innerHTML = '<div class="empty">暂无排期数据</div>';
    return;
  }
  // Filter by current month
  const prefix = curY+'-'+String(curM).padStart(2,'0');
  const filtered = {};
  for(const k in data){
    if(!data[k].pd || data[k].pd.startsWith(prefix)){
      filtered[k] = data[k];
    }
  }
  data = filtered;

  // Group slots by account prefix
  const grouped = {};
  GROUPS.forEach(g => { grouped[g.key] = []; });

  Object.keys(data).forEach(k => {
    const m = k.match(/^(\d+)_(uw|tt|hkig|usig|ustt|usfb|usigoff)_(\d+)$/);
    if(m){
      const prefix = m[2];
      const slot = data[k];
      if(slot.t && slot.t.trim()){
        if(grouped[prefix]) grouped[prefix].push({key:k, day:parseInt(m[1]), idx:parseInt(m[3]), ...slot});
      }
    }
  });

  let html = '';

  // Stats bar
  let total = 0;
  GROUPS.forEach(g => { total += grouped[g.key].length; });
  html += '<div class="stats"><span>📊 总计 ' + total + ' 条</span></div>';

  GROUPS.forEach(g => {
    const items = grouped[g.key];
    if(items.length === 0){
      html += '<div class="sec"><div class="sec-hdr" style="background:'+g.bg+';color:'+g.color+'">'+g.label+' <span style="font-weight:400;font-size:11px;color:var(--text-dim)">· 0条</span></div><div class="sec-body"><div class="empty">暂无排期</div></div></div>';
      return;
    }

    // Sort by day then idx
    items.sort((a,b) => a.day-b.day || a.idx-b.idx);

    html += '<div class="sec"><div class="sec-hdr" style="background:'+g.bg+';color:'+g.color+'">'+g.label+' <span style="font-weight:400;font-size:11px;color:var(--text-dim)">· '+items.length+'条</span></div><div class="sec-body">';

    items.forEach(item => {
      const pd = item.pd || '';
      const d = pd ? pd.slice(5) : (item.day ? '07-'+String(item.day).padStart(2,'0') : '');
      const progIdx = PROGRESS.indexOf(item.p);
      const progClass = progIdx >= 2 ? 's' : (progIdx >= 0 ? 'w' : '');
      const statusTag = item.p ? '<span class="tag '+progClass+'">'+item.p+'</span>' : '';
      const linkTag = item.l ? '<span class="tag">🔗 有链接</span>' : '';

      html += '<div class="post">';
      const tm = item.tm || '';
      html += '<div class="pd">'+d+'<br><span class="pt">'+(tm||'#要补时间')+'</span></div>';
      html += '<div class="pc">';
      html += '<div class="pn">'+esc(item.t)+'</div>';
      html += '<div class="tags">';
      html += statusTag + linkTag;
      if(item.s) html += '<span class="tag">'+esc(item.s)+'</span>';
      html += '</div></div></div>';
    });

    html += '</div></div>';
  });

  app.innerHTML = html;
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let curM = (new Date()).getMonth()+1;
let curY = (new Date()).getFullYear();

function goToMonth(delta){
  // delta: -1 for previous month, +1 for next month
  // Ensure numeric types
  let newM = Number(curM) + delta;
  let newY = Number(curY);
  if(isNaN(newM)) newM = (new Date()).getMonth()+1;
  if(isNaN(newY)) newY = (new Date()).getFullYear();
  if(newM > 12){ newM = 1; newY++; }
  if(newM < 1){ newM = 12; newY--; }
  curM = newM;
  curY = newY;
  document.getElementById('monthLabel').textContent = curY+'年'+curM+'月';
  // Re-render with same data, just different month filter
  loadAndRender();
}

let cachedData = null;

async function loadAndRender(){
  const data = await loadData();
  if(data) render(data);
  else render(null);
}

document.getElementById('monthLabel').textContent = curY+'年'+curM+'月';
loadAndRender();
</script>
</body>
</html>
